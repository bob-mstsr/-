<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derivative Table - 安定表示版</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.2.0/css/scroller.dataTables.min.css">
    
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/scroller/2.2.0/js/dataTables.scroller.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/jquery.mark.min.js"></script>

    <style>
        :root {
            --bg-color: #121416;
            --card-bg: #1e2124;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --border-color: #3e4246; /* 境界線を少し見やすく */
            --row-even: #25282c;    /* 縞々（偶数行）の色 */
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header {
            background: #000; height: 60px; display: flex; 
            justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 2px solid var(--accent-color); padding: 0 15px; flex-shrink: 0;
        }
        .logo-link { text-decoration: none; font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }

        .toolbar {
            display: flex; align-items: center; gap: 15px; padding: 10px 15px; 
            background: #222; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        
        .search-box {
            background: #333; color: white; border: 1px solid var(--accent-color);
            padding: 8px 15px; border-radius: 4px; outline: none; width: 300px;
        }

        /* テーブルエリア */
        .table-container { 
            flex-grow: 1; 
            background: var(--bg-color); 
            overflow: hidden; /* 親は隠す */
            padding: 10px;
        }
        
        /* 縞々模様と配色 */
        table.dataTable { font-size: 13px !important; background-color: var(--card-bg) !important; }
        table.dataTable thead th { background-color: #2c3136 !important; color: var(--accent-color); border-bottom: 2px solid var(--accent-color) !important; }
        
        table.dataTable td { 
            white-space: pre; 
            padding: 6px 10px !important; 
            border-bottom: 1px solid var(--border-color) !important;
            border-right: 1px solid var(--border-color) !important;
            font-family: "MS Gothic", "Osaka-mono", monospace;
        }

        /* 奇数・偶数行の色分け */
        table.dataTable tbody tr:nth-child(odd) { background-color: var(--card-bg) !important; }
        table.dataTable tbody tr:nth-child(even) { background-color: var(--row-even) !important; }
        table.dataTable tbody tr:hover { background-color: #2d353d !important; }

        /* 横スクロールバーを見やすく */
        .dataTables_scrollBody::-webkit-scrollbar { height: 12px; }
        .dataTables_scrollBody::-webkit-scrollbar-track { background: #111; }
        .dataTables_scrollBody::-webkit-scrollbar-thumb { background: #444; border-radius: 6px; border: 3px solid #111; }
        .dataTables_scrollBody::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        mark { background: #ffeb3b; color: #000; padding: 0; }
    </style>
</head>
<body>

<header>
    <a href="index.html#main" class="logo-link">ボブの秘密基地</a>
    <div style="font-size: 12px; color: var(--accent-color);">Derivative Table</div>
</header>

<div class="toolbar">
    <input type="text" id="searchInput" class="search-box" placeholder="検索ワードを入力...">
    <span id="searchStatus" style="font-size: 12px; color: #888;"></span>
</div>

<div class="table-container">
    <table id="derivativeTable" class="display nowrap" style="width:100%"></table>
</div>

<script>
$(document).ready(function () {
    let table;
    let searchTimeout;

    Papa.parse("derivatives.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        encoding: "Shift-JIS", // ★①文字化け対策：ここをShift-JISに変更
        complete: function (results) {
            initDataTable(results);
        }
    });

    function initDataTable(results) {
        const columns = results.meta.fields.map(field => ({
            title: field,
            data: field,
            defaultContent: ""
        }));

        table = $('#derivativeTable').DataTable({
            data: results.data,
            columns: columns,
            deferRender: true,
            scrollY: "calc(100vh - 160px)",
            scrollX: true,        // ★②横スクロールを有効化
            scroller: true,
            dom: 'rti',
            paging: true,
            language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ja.json" }
        });

        // 検索処理
        $('#searchInput').on('input', function() {
            clearTimeout(searchTimeout);
            const keyword = $(this).val();
            
            searchTimeout = setTimeout(() => {
                table.search(keyword).draw();
                if (keyword.length > 0) {
                    const firstMatch = table.rows({search:'applied'}).indexes()[0];
                    if (firstMatch !== undefined) {
                        table.row(firstMatch).scrollTo();
                    }
                    // ハイライト（現在見えている範囲に適用）
                    $('.dataTables_scrollBody').unmark().mark(keyword);
                }
            }, 400);
        });
    }
});
</script>
</body>
</html>

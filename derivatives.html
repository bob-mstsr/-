<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derivative Table - ボブの秘密基地</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/jquery.mark.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1c1e;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --card-bg: #25282c;
            --border-color: #444;
            --highlight-color: #ffeb3b; /* ハイライト色（黄色） */
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; }

        header {
            background: rgba(0,0,0,0.95); height: 60px; display: flex; 
            justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 2px solid var(--accent-color); 
            padding: 0 15px; flex-shrink: 0; box-sizing: border-box;
        }
        .logo-link { text-decoration: none; font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }

        .toolbar {
            display: flex; flex-wrap: wrap; align-items: center; gap: 15px;
            padding: 10px 15px; background: #222; border-bottom: 1px solid var(--accent-color);
            font-size: 13px; flex-shrink: 0;
        }
        
        .search-box {
            background: #333; color: white; border: 1px solid var(--accent-color);
            padding: 6px 12px; border-radius: 4px; outline: none; width: 250px;
        }

        .table-wrapper { flex-grow: 1; overflow: auto; background: var(--card-bg); position: relative; }
        
        #derivativeTable { width: 100% !important; font-size: 12px; border-collapse: separate; border-spacing: 0; }
        #derivativeTable th, #derivativeTable td { 
            white-space: pre; /* 改行やスペースを維持 */
            padding: 4px 8px; 
            border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color);
            background-color: var(--card-bg); color: var(--text-color);
            font-family: "Consolas", "Monaco", "Courier New", monospace; /* 等幅フォント */
        }

        #derivativeTable thead th { position: sticky; top: 0; z-index: 100; background-color: #333 !important; color: var(--accent-color); }
        
        /* 1〜4列目あたりまで固定（Noや機体名） */
        #derivativeTable th:nth-child(-n+4), #derivativeTable td:nth-child(-n+4) { position: sticky; background-color: #2a2d31; z-index: 10; }
        #derivativeTable th:nth-child(1), #derivativeTable td:nth-child(1) { left: 0; }
        #derivativeTable th:nth-child(2), #derivativeTable td:nth-child(2) { left: 40px; }
        #derivativeTable th:nth-child(3), #derivativeTable td:nth-child(3) { left: 80px; }
        #derivativeTable th:nth-child(4), #derivativeTable td:nth-child(4) { left: 120px; border-right: 2px solid var(--accent-color); }

        mark { background: var(--highlight-color); color: black; padding: 0; }
        
        /* スクロールバー */
        .table-wrapper::-webkit-scrollbar { height: 12px; width: 12px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 6px; }
    </style>
</head>
<body>

<header>
    <a href="index.html#main" class="logo-link">ボブの秘密基地</a>
    <nav style="display:flex; gap:10px;">
        <a href="unit.html" style="color:#eee; text-decoration:none; font-size:14px;">Unit</a>
        <a href="derivatives.html" style="color:var(--accent-color); text-decoration:none; font-size:14px;">Derivatives</a>
    </nav>
</header>

<div class="toolbar">
    <input type="text" id="searchInput" class="search-box" placeholder="機体名やNoで検索してジャンプ...">
    <span id="searchStatus" style="font-size: 11px; color: #888;"></span>
</div>

<div class="table-wrapper" id="scrollTarget">
    <table id="derivativeTable" class="display nowrap"></table>
</div>

<script>
$(document).ready(function () {
    let table = null;

    function initTable() {
        // ファイル名をアップロードしたものに合わせる（または derivatives.csv にリネーム）
        const csvFile = "derivatives.csv"; 

        Papa.parse(csvFile, {
            download: true,
            header: false, // 冒頭2行を飛ばすため一旦false
            skipEmptyLines: true,
            encoding: "UTF-8",
            complete: function (results) {
                const rawData = results.data;
                if (rawData.length < 3) return;

                // 冒頭2行を削除し、3行目をヘッダーとして採用
                const headers = rawData[2]; 
                const bodyData = rawData.slice(3);

                let tableHtml = '<thead><tr>';
                headers.forEach(h => tableHtml += `<th>${h || ''}</th>`);
                tableHtml += '</tr></thead><tbody id="tableBody"></tbody>';
                $('#derivativeTable').html(tableHtml);

                bodyData.forEach(row => {
                    let tr = '<tr>';
                    row.forEach(val => {
                        tr += `<td>${val || ''}</td>`;
                    });
                    tr += '</tr>';
                    $('#tableBody').append(tr);
                });

                table = $('#derivativeTable').DataTable({
                    dom: 'rtip', // 標準検索窓は隠す
                    paging: false,
                    scrollX: true,
                    autoWidth: false,
                    language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ja.json" }
                });

                // カスタム検索機能
                $('#searchInput').on('input', function() {
                    const keyword = $(this).val();
                    
                    // 1. 検索実行
                    table.search(keyword).draw();
                    
                    // 2. ハイライト適用
                    $('#tableBody').unmark({
                        done: function() {
                            $('#tableBody').mark(keyword, {
                                separateWordSearch: false,
                                done: function() {
                                    // 3. 最初のヒット位置へジャンプ
                                    const firstMatch = $('mark').first();
                                    if (firstMatch.length && keyword !== "") {
                                        const container = $('#scrollTarget');
                                        const pos = firstMatch.offset().top - container.offset().top + container.scrollTop() - 100;
                                        container.stop().animate({ scrollTop: pos }, 300);
                                        $('#searchStatus').text('ヒットしました');
                                    } else {
                                        $('#searchStatus').text('');
                                    }
                                }
                            });
                        }
                    });
                });
            }
        });
    }

    initTable();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derivative Table - ボブの秘密基地</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.2.0/css/scroller.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
    
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/scroller/2.2.0/js/dataTables.scroller.min.js"></script>
    <script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/jquery.mark.min.js"></script>

    <style>
        :root {
            --bg-color: #0f1113;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --border-color: #444;
            --sticky-bg: #2a2d31;
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ④ヘッダーリンクの追加 */
        header {
            background: #000; height: 60px; display: flex; 
            justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 2px solid var(--accent-color); padding: 0 15px; flex-shrink: 0;
        }
        .logo-link { text-decoration: none; font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }
        .nav-links { display: flex; gap: 15px; }
        .nav-item { color: #ccc; text-decoration: none; font-size: 0.9rem; }
        .nav-item:hover { color: var(--accent-color); }

        .toolbar {
            display: flex; align-items: center; gap: 15px; padding: 10px 15px; 
            background: #222; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        
        .search-box {
            background: #333; color: white; border: 1px solid var(--accent-color);
            padding: 8px 15px; border-radius: 4px; outline: none; width: 300px;
        }

        /* テーブルコンテナ設定 */
        .table-container { flex-grow: 1; background: var(--bg-color); overflow: hidden; padding: 0 5px; }
        
        table.dataTable { font-size: 13px !important; margin: 0 !important; }
        table.dataTable td, table.dataTable th { 
            white-space: pre; padding: 6px 10px !important; 
            border-bottom: 1px solid var(--border-color) !important;
            border-right: 1px solid var(--border-color) !important;
            font-family: "MS Gothic", "Osaka-mono", monospace; /* 記号の幅を維持 */
        }

        /* ②ソートアイコンを非表示（派生順を守るため） */
        table.dataTable thead .sorting,
        table.dataTable thead .sorting_asc,
        table.dataTable thead .sorting_desc { background-image: none !important; cursor: default; }

        /* ③横スクロールバーを太く見やすく */
        .dataTables_scrollBody::-webkit-scrollbar { height: 18px; }
        .dataTables_scrollBody::-webkit-scrollbar-track { background: #111; }
        .dataTables_scrollBody::-webkit-scrollbar-thumb { 
            background: #666; border-radius: 10px; border: 3px solid #111;
        }
        .dataTables_scrollBody::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        /* 固定列の背景 */
        .dtfc-fixed-left { background-color: var(--sticky-bg) !important; z-index: 5; }
        
        mark { background: #ffeb3b; color: #000; padding: 0 2px; }
    </style>
</head>
<body>

<header>
    <a href="index.html#main" class="logo-link">ボブの秘密基地</a>
    <nav class="nav-links">
        <a href="unit.html" class="nav-item">Unit</a>
        <a href="arms.html" class="nav-item">Arms</a>
        <a href="tactics.html" class="nav-item">Tactics</a>
    </nav>
</header>

<div class="toolbar">
    <input type="text" id="searchInput" class="search-box" placeholder="検索（派生順は維持されます）">
    <span id="searchStatus" style="font-size: 12px; color: #888;"></span>
</div>

<div class="table-container">
    <table id="derivativeTable" class="display nowrap" style="width:100%"></table>
</div>

<script>
$(document).ready(function () {
    let table;
    let searchTimeout;

    // ①文字化け対策（Shift-JIS指定）
    Papa.parse("derivatives.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        encoding: "Shift-JIS",
        complete: function (results) {
            initDataTable(results);
        }
    });

    function initDataTable(results) {
        const columns = results.meta.fields.map(field => ({
            title: field || " ",
            data: field,
            orderable: false, // ②全体での並び替えを禁止
            defaultContent: ""
        }));

        table = $('#derivativeTable').DataTable({
            data: results.data,
            columns: columns,
            deferRender: true,
            scrollY: "calc(100vh - 140px)",
            scrollX: true,
            scroller: true,
            dom: 'rti',
            ordering: false, // ②初期の並び替えも無効化（CSVの順序を守る）
            fixedColumns: { left: 2 }, // 2列目まで固定
            language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ja.json" }
        });

        // 検索とジャンプ
        $('#searchInput').on('input', function() {
            clearTimeout(searchTimeout);
            const keyword = $(this).val();
            
            searchTimeout = setTimeout(() => {
                table.search(keyword).draw();
                if (keyword.length > 0) {
                    const firstMatch = table.rows({search:'applied'}).indexes()[0];
                    if (firstMatch !== undefined) {
                        table.row(firstMatch).scrollTo();
                    }
                    $('.dataTables_scrollBody').unmark().mark(keyword);
                }
            }, 400);
        });
    }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derivative Table - 最終調整版</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.2.0/css/scroller.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
    
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/scroller/2.2.0/js/dataTables.scroller.min.js"></script>
    <script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/jquery.mark.min.js"></script>

    <style>
        :root {
            --bg-color: #0f1113;
            --card-bg: #1e2124;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --border-color: #444;
            --sticky-bg: #2a2d31; /* 固定列の背景色 */
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header {
            background: #000; height: 50px; display: flex; 
            justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 2px solid var(--accent-color); padding: 0 15px; flex-shrink: 0;
        }
        .logo-link { text-decoration: none; font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }

        .toolbar {
            display: flex; align-items: center; gap: 15px; padding: 10px 15px; 
            background: #222; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        
        .search-box {
            background: #333; color: white; border: 1px solid var(--accent-color);
            padding: 8px 15px; border-radius: 4px; outline: none; width: 300px; font-size: 14px;
        }

        /* テーブルエリア：ここがスクロールバーの位置を決める */
        .table-container { 
            flex-grow: 1; 
            background: var(--bg-color); 
            overflow: hidden; 
            padding: 0 10px 10px 10px;
        }
        
        table.dataTable { font-size: 13px !important; background-color: var(--card-bg) !important; margin: 0 !important; }
        
        /* セルのデザイン */
        table.dataTable td, table.dataTable th { 
            white-space: pre; 
            padding: 8px 12px !important; 
            border-bottom: 1px solid var(--border-color) !important;
            border-right: 1px solid var(--border-color) !important;
            font-family: "MS Gothic", "Osaka-mono", monospace;
        }

        /* ヘッダー */
        table.dataTable thead th { background-color: #333 !important; color: var(--accent-color); border-bottom: 2px solid var(--accent-color) !important; }

        /* 列の固定設定 (CSSによる制御) */
        .dtfc-fixed-left { background-color: var(--sticky-bg) !important; z-index: 5; }
        
        /* 横スクロールバーを見やすく強調 */
        .dataTables_scrollBody::-webkit-scrollbar { height: 16px; width: 16px; }
        .dataTables_scrollBody::-webkit-scrollbar-track { background: #111; }
        .dataTables_scrollBody::-webkit-scrollbar-thumb { 
            background: #555; 
            border-radius: 8px; 
            border: 3px solid #111; 
        }
        .dataTables_scrollBody::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        /* 偶数行の色分け */
        table.dataTable tbody tr:nth-child(even) { background-color: #25282c !important; }
        table.dataTable tbody tr:hover td { background-color: #2d353d !important; }

        mark { background: #ffeb3b; color: #000; padding: 0 2px; }
    </style>
</head>
<body>

<header>
    <a href="index.html#main" class="logo-link">ボブの秘密基地</a>
    <div style="font-size: 12px; color: var(--accent-color);">Derivative Table (High-Speed & Fixed)</div>
</header>

<div class="toolbar">
    <input type="text" id="searchInput" class="search-box" placeholder="機体名、NOなどで検索...">
    <span id="searchStatus" style="font-size: 12px; color: #888;"></span>
</div>

<div class="table-container">
    <table id="derivativeTable" class="display nowrap" style="width:100%"></table>
</div>

<script>
$(document).ready(function () {
    let table;
    let searchTimeout;

    // ファイル名を derivatives.csv に合わせて読み込み
    Papa.parse("derivatives.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        encoding: "Shift-JIS",
        complete: function (results) {
            initDataTable(results);
        }
    });

    function initDataTable(results) {
        const columns = results.meta.fields.map(field => ({
            title: field || " ",
            data: field,
            defaultContent: ""
        }));

        table = $('#derivativeTable').DataTable({
            data: results.data,
            columns: columns,
            deferRender: true,
            scrollY: "calc(100vh - 130px)", // ★画面下部にスクロールバーを配置するための高さ計算
            scrollX: true,
            scroller: true,
            dom: 'rti',
            fixedColumns: {
                left: 2 // ★2列目（目的派生検索）まで固定
            },
            language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ja.json" }
        });

        // 検索とジャンプ
        $('#searchInput').on('input', function() {
            clearTimeout(searchTimeout);
            const keyword = $(this).val();
            
            searchTimeout = setTimeout(() => {
                table.search(keyword).draw();
                if (keyword.length > 0) {
                    const firstMatch = table.rows({search:'applied'}).indexes()[0];
                    if (firstMatch !== undefined) {
                        table.row(firstMatch).scrollTo();
                    }
                    // 見えている範囲をハイライト
                    $('.dataTables_scrollBody').unmark().mark(keyword);
                }
            }, 400);
        });
    }
});
</script>
</body>
</html>

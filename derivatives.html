<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derivative Table - 高速版</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.2.0/css/scroller.dataTables.min.css">
    
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/scroller/2.2.0/js/dataTables.scroller.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/jquery.mark.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1c1e;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --card-bg: #25282c;
            --border-color: #444;
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header {
            background: rgba(0,0,0,0.95); height: 60px; display: flex; 
            justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 2px solid var(--accent-color); padding: 0 15px; flex-shrink: 0;
        }
        .logo-link { text-decoration: none; font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }

        .toolbar {
            display: flex; align-items: center; gap: 15px; padding: 10px 15px; 
            background: #222; border-bottom: 1px solid var(--accent-color); flex-shrink: 0;
        }
        
        .search-box {
            background: #333; color: white; border: 1px solid var(--accent-color);
            padding: 8px 15px; border-radius: 4px; outline: none; width: 300px;
        }

        /* テーブルエリアの設定 */
        .table-container { flex-grow: 1; background: var(--card-bg); overflow: hidden; }
        
        table.dataTable { font-size: 12px; margin: 0 !important; border-collapse: collapse !important; }
        table.dataTable td, table.dataTable th { 
            white-space: pre; padding: 4px 8px !important; 
            border-bottom: 1px solid var(--border-color) !important;
            border-right: 1px solid var(--border-color) !important;
            font-family: "MS Gothic", "Osaka-mono", "monospace";
        }

        /* 検索ヒット時のハイライト */
        mark { background: #ffeb3b; color: #000; padding: 0; }

        /* スクロール設定 */
        .dataTables_scrollBody { border-bottom: none !important; }
    </style>
</head>
<body>

<header>
    <a href="index.html#main" class="logo-link">ボブの秘密基地</a>
    <div style="font-size: 12px; color: var(--accent-color);">Derivative Table 高速モード</div>
</header>

<div class="toolbar">
    <input type="text" id="searchInput" class="search-box" placeholder="検索（入力後、少し待つとジャンプします）">
    <span id="searchStatus" style="font-size: 12px; color: #888;"></span>
</div>

<div class="table-container">
    <table id="derivativeTable" class="display nowrap" style="width:100%"></table>
</div>

<script>
$(document).ready(function () {
    let table;
    let searchTimeout;

    // CSVの読み込み
    Papa.parse("derivatives.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        encoding: "UTF-8",
        complete: function (results) {
            initDataTable(results);
        }
    });

    function initDataTable(results) {
        const columns = results.meta.fields.map(field => ({
            title: field,
            data: field,
            defaultContent: ""
        }));

        table = $('#derivativeTable').DataTable({
            data: results.data,
            columns: columns,
            deferRender: true,    // 遅延レンダリング（高速化の肝）
            scrollY: "calc(100vh - 120px)", // 画面の高さに合わせる
            scrollX: true,
            scroller: true,       // 仮想スクロール有効（これがあれば重くない）
            dom: 'rti',           // 余計なUIを隠す
            paging: true,         // Scrollerを使うため内部的にはON
            language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ja.json" }
        });

        // 検索とジャンプの処理（デバウンス付）
        $('#searchInput').on('input', function() {
            clearTimeout(searchTimeout);
            const keyword = $(this).val();
            
            // 0.5秒入力が止まったら処理開始（フリーズ防止）
            searchTimeout = setTimeout(() => {
                table.search(keyword).draw();
                
                if (keyword.length > 0) {
                    highlightAndJump(keyword);
                }
            }, 500);
        });
    }

    function highlightAndJump(keyword) {
        // 現在表示されているセルだけハイライト（高速化のため）
        const $target = $('#derivativeTable tbody');
        $target.unmark().mark(keyword, {
            separateWordSearch: false,
            done: function(count) {
                $('#searchStatus').text(count + ' 件の候補が見つかりました');
                
                // 最初にヒットした行にスクロール
                const firstMatch = table.rows({search:'applied'}).indexes()[0];
                if (firstMatch !== undefined) {
                    table.row(firstMatch).scrollTo();
                }
            }
        });
    }
});
</script>
</body>
</html>

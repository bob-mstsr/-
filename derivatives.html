<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derivative Table - ボブの秘密基地</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.2.0/css/scroller.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
    
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/scroller/2.2.0/js/dataTables.scroller.min.js"></script>
    <script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/jquery.mark.min.js"></script>

    <style>
        :root {
            --bg-color: #0f1113;
            --card-bg: #1e2124;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --border-color: #444;
            --sticky-bg: #2a2d31;
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header {
            background: #000; min-height: 60px; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 1000; border-bottom: 2px solid var(--accent-color); padding: 5px 15px; flex-shrink: 0;
        }
        .logo-link { text-decoration: none; font-weight: bold; font-size: 1.1rem; color: var(--accent-color); margin-bottom: 5px; }
        .nav-links { display: flex; gap: 8px; overflow-x: auto; max-width: 100%; padding-bottom: 5px; scrollbar-width: none; }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-item-custom { color: #ccc; text-decoration: none; font-size: 0.75rem; white-space: nowrap; padding: 3px 8px; border: 1px solid #444; border-radius: 3px; background: #222; }
        .nav-item-custom:hover { border-color: var(--accent-color); color: var(--accent-color); }

        .toolbar {
            display: flex; align-items: center; gap: 15px; padding: 10px 15px; 
            background: #222; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
        
        .search-box {
            background: #333; color: white; border: 1px solid var(--accent-color);
            padding: 8px 15px; border-radius: 4px; outline: none; width: 300px;
        }

        .table-container { flex-grow: 1; background: var(--bg-color); overflow: hidden; }
        
        /* ②配色：全セルをダーク背景、テキストを明るい色に強制 */
        table.dataTable, table.dataTable tbody tr { background-color: var(--card-bg) !important; }
        table.dataTable td, table.dataTable th { 
            white-space: pre; padding: 6px 10px !important; 
            border-bottom: 1px solid var(--border-color) !important;
            border-right: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            background-color: var(--card-bg) !important;
            font-family: "MS Gothic", "Osaka-mono", monospace;
        }

        .dtfc-fixed-left td, .dtfc-fixed-left th { background-color: var(--sticky-bg) !important; z-index: 5; }

        .dataTables_scrollBody::-webkit-scrollbar { height: 16px; width: 16px; }
        .dataTables_scrollBody::-webkit-scrollbar-track { background: #111; }
        .dataTables_scrollBody::-webkit-scrollbar-thumb { 
            background: #555; border-radius: 8px; border: 3px solid #111;
        }
        .dataTables_scrollBody::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        mark { background: #ffeb3b; color: #000; padding: 0 2px; }
    </style>
</head>
<body>

<header>
    <a href="index.html#main" class="logo-link">ボブの秘密基地</a>
    <nav class="nav-links">
        <a href="unit.html" class="nav-item-custom">Unit</a>
        <a href="derivatives.html" class="nav-item-custom">Derivatives</a>
        <a href="arms.html" class="nav-item-custom">Arms</a>
        <a href="battle.html" class="nav-item-custom">Battle</a>
        <a href="tactics.html" class="nav-item-custom">Tactics</a>
        <a href="hunter.html" class="nav-item-custom">Hunter</a>
        <a href="trivia.html" class="nav-item-custom">Trivia</a>
        <a href="emoji.html" class="nav-item-custom">Emoji</a>
        <a href="link.html" class="nav-item-custom">Link</a>
    </nav>
</header>

<div class="toolbar">
    <input type="text" id="searchInput" class="search-box" placeholder="機体検索...">
    <span id="searchStatus" style="font-size: 12px; color: #888;"></span>
</div>

<div class="table-container">
    <table id="derivativeTable" class="display nowrap" style="width:100%"></table>
</div>

<script>
$(document).ready(function () {
    let table;
    let searchTimeout;

    // ①文字化け対策：fetchを使ってバイナリとして読み込み、再デコードする
    fetch('derivatives.csv')
        .then(response => response.arrayBuffer())
        .then(buffer => {
            const decoder = new TextDecoder('shift-jis');
            const csvText = decoder.decode(buffer);
            
            Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true,
                complete: function (results) {
                    initDataTable(results);
                }
            });
        });

    function initDataTable(results) {
        const columns = results.meta.fields.map(field => ({
            title: field || " ",
            data: field,
            orderable: false,
            defaultContent: ""
        }));

        table = $('#derivativeTable').DataTable({
            data: results.data,
            columns: columns,
            deferRender: true,
            scrollY: "calc(100vh - 150px)",
            scrollX: true,
            scroller: true,
            dom: 'rti',
            ordering: false, 
            fixedColumns: { left: 2 }, 
            language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ja.json" }
        });

        $('#searchInput').on('input', function() {
            clearTimeout(searchTimeout);
            const keyword = $(this).val();
            searchTimeout = setTimeout(() => {
                table.search(keyword).draw();
                if (keyword.length > 0) {
                    const firstMatch = table.rows({search:'applied'}).indexes()[0];
                    if (firstMatch !== undefined) {
                        table.row(firstMatch).scrollTo();
                    }
                    $('.dataTables_scrollBody').unmark().mark(keyword);
                }
            }, 400);
        });
    }
});
</script>
</body>
</html>

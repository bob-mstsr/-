<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derivative Table - ボブの秘密基地</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/jquery.mark.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1c1e;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --card-bg: #25282c;
            --border-color: #444;
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header {
            background: rgba(0,0,0,0.95); height: 60px; display: flex; 
            justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 2px solid var(--accent-color); 
            padding: 0 15px; flex-shrink: 0; box-sizing: border-box;
        }
        .logo-link { text-decoration: none; font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }

        .toolbar {
            display: flex; flex-wrap: wrap; align-items: center; gap: 15px;
            padding: 10px 15px; background: #222; border-bottom: 1px solid var(--accent-color);
            font-size: 13px; flex-shrink: 0;
        }
        
        .search-box {
            background: #333; color: white; border: 1px solid var(--accent-color);
            padding: 8px 15px; border-radius: 4px; outline: none; width: 300px; font-size: 14px;
        }

        .table-wrapper { flex-grow: 1; overflow: auto; background: var(--card-bg); position: relative; }
        
        #derivativeTable { width: 100% !important; font-size: 13px; border-collapse: separate; border-spacing: 0; }
        #derivativeTable th, #derivativeTable td { 
            white-space: pre; /* 罫線スペースを維持 */
            padding: 6px 10px; 
            border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color);
            background-color: var(--card-bg);
            /* 派生表のキモ：等幅フォント */
            font-family: "MS Gothic", "Osaka-mono", "monospace"; 
        }

        #derivativeTable thead th { position: sticky; top: 0; z-index: 100; background-color: #333 !important; color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }
        
        /* 列固定：通番、機体名、NOなど（最初の4列） */
        #derivativeTable th:nth-child(-n+4), #derivativeTable td:nth-child(-n+4) { position: sticky; background-color: #2a2d31; z-index: 10; }
        #derivativeTable th:nth-child(1), #derivativeTable td:nth-child(1) { left: 0; }
        #derivativeTable th:nth-child(2), #derivativeTable td:nth-child(2) { left: 70px; }
        #derivativeTable th:nth-child(3), #derivativeTable td:nth-child(3) { left: 100px; }
        #derivativeTable th:nth-child(4), #derivativeTable td:nth-child(4) { left: 240px; border-right: 2px solid var(--accent-color); }

        /* ハイライト色 */
        mark { background: #ffeb3b; color: #000; padding: 0 2px; border-radius: 2px; }

        /* スクロールバー装飾 */
        .table-wrapper::-webkit-scrollbar { height: 12px; width: 12px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 6px; }
    </style>
</head>
<body>

<header>
    <a href="index.html#main" class="logo-link">ボブの秘密基地</a>
    <nav style="display:flex; gap:10px;">
        <a href="unit.html" style="color:#eee; text-decoration:none; font-size:14px;">Unit</a>
        <a href="derivatives.html" style="color:var(--accent-color); text-decoration:none; font-size:14px;">Derivatives</a>
        <a href="arms.html" style="color:#eee; text-decoration:none; font-size:14px;">Arms</a>
    </nav>
</header>

<div class="toolbar">
    <input type="text" id="searchInput" class="search-box" placeholder="機体名、NOなどで検索...">
    <div id="searchInfo" style="color: #888;"></div>
</div>

<div class="table-wrapper" id="mainContainer">
    <table id="derivativeTable" class="display nowrap"></table>
</div>

<script>
$(document).ready(function () {
    let table = null;

    function initTable() {
        Papa.parse("derivatives.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            encoding: "UTF-8",
            complete: function (results) {
                const headers = results.meta.fields;
                let tableHtml = '<thead><tr>';
                headers.forEach(h => tableHtml += `<th>${h || ''}</th>`);
                tableHtml += '</tr></thead><tbody id="tableBody"></tbody>';
                $('#derivativeTable').html(tableHtml);

                results.data.forEach(row => {
                    let tr = '<tr>';
                    headers.forEach(h => {
                        let val = row[h] || '';
                        tr += `<td>${val}</td>`;
                    });
                    tr += '</tr>';
                    $('#tableBody').append(tr);
                });

                table = $('#derivativeTable').DataTable({
                    dom: 'rtip',
                    paging: false,
                    scrollX: true,
                    autoWidth: false,
                    language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ja.json" }
                });

                setupSearch();
            }
        });
    }

    function setupSearch() {
        const $input = $('#searchInput');
        const $body = $('#tableBody');
        const $container = $('#mainContainer');

        $input.on('input', function() {
            const keyword = $(this).val();
            
            // DataTablesのフィルタリング（行の絞り込み）
            table.search(keyword).draw();

            // ハイライトとジャンプ
            $body.unmark({
                done: function() {
                    if (keyword.length < 1) {
                        $('#searchInfo').text('');
                        return;
                    }

                    $body.mark(keyword, {
                        separateWordSearch: false,
                        done: function(count) {
                            $('#searchInfo').text(count + ' 件ヒット');
                            
                            // 最初のハイライト要素までジャンプ
                            const $firstMatch = $('mark').first();
                            if ($firstMatch.length) {
                                const offset = $firstMatch.offset().top - $container.offset().top + $container.scrollTop() - 100;
                                $container.stop().animate({ scrollTop: offset }, 300);
                            }
                        }
                    });
                }
            });
        });
    }

    initTable();
});
</script>
</body>
</html>

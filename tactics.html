<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tactics - ボブの秘密基地</title>
    <style>
        :root {
            --bg-color: #1a1c1e;
            --accent-color: #00d4ff; /* 🚩 Tacticsのイメージカラー */
            --text-color: #e0e0e0;
            --card-bg: #25282c;
            --border-color: #444;
            --header-total-height: 120px; /* 検索窓がない分、高さを調整 */
        }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden; font-family: sans-serif;
        }

        /* 上部固定エリア */
        .top-section {
            height: var(--header-total-height);
            background: var(--bg-color);
            border-bottom: 2px solid var(--accent-color);
            padding: 10px 20px; box-sizing: border-box;
            position: relative; z-index: 100;
        }

        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 5px 0; font-size: 1.4rem; color: var(--accent-color); }
        .back-link { 
            color: var(--text-color); text-decoration: none; font-size: 0.9rem; 
            border: 1px solid var(--text-color); padding: 5px 10px; border-radius: 4px;
        }
        .back-link:hover { background: var(--text-color); color: #000; }
        
        .tabs { display: flex; gap: 5px; margin-top: 15px; }
        .tab-btn {
            padding: 8px 15px; background: #333; border: none;
            color: var(--text-color); cursor: pointer; border-radius: 4px 4px 0 0;
        }
        .tab-btn.active { background: var(--accent-color); color: #000; font-weight: bold; }

        /* データ表示エリア */
        .main-content {
            height: calc(100% - var(--header-total-height));
            overflow-y: auto; padding: 10px 20px 20px 20px; box-sizing: border-box;
        }

        .info-box {
            background: var(--card-bg);
            padding: 25px;
            border-left: 4px solid var(--accent-color);
            line-height: 1.8;
            white-space: pre-wrap; /* 改行をそのまま反映 */
            font-size: 0.95rem;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* テキスト内の強調用（必要に応じて） */
        .section-title {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
            border-bottom: 1px solid #444;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="top-section">
    <div class="header-flex">
        <header><h1>🚩 Tactics</h1></header>
        <a href="index.html" class="back-link">← 基地TOPに戻る</a>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('personal')">👤 個人戦術</button>
        <button class="tab-btn" onclick="switchTab('team')">👥 団体戦術</button>
    </div>
</div>

<div class="main-content">
    <div id="personal" class="tab-content">
        <div class="info-box" id="personal-content">読み込み中...</div>
    </div>

    <div id="team" class="tab-content" style="display:none;">
        <div class="info-box" id="team-content">読み込み中...</div>
    </div>
</div>

<script>
    // TXT 外部ファイル読み込み処理
    async function loadData() {
        try {
            // 個人戦術.txtの読み込み
            const resP = await fetch('個人戦術.txt');
            if (!resP.ok) throw new Error();
            const txtP = await resP.text();
            document.getElementById('personal-content').innerText = txtP;

            // 団体戦術.txtの読み込み
            const resT = await fetch('団体戦術.txt');
            if (!resT.ok) throw new Error();
            const txtT = await resT.text();
            document.getElementById('team-content').innerText = txtT;

        } catch (e) {
            const errorMsg = "データの読み込みに失敗しました。\n・GitHubにファイルをアップロードしているか\n・ファイル名が正しいか（個人戦術.txt / 団体戦術.txt）\nを確認してください。";
            document.getElementById('personal-content').innerText = errorMsg;
            document.getElementById('team-content').innerText = errorMsg;
        }
    }

    // タブ切り替え処理
    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(tabName).style.display = 'block';
        event.currentTarget.classList.add('active');
        
        // スクロール位置をリセット
        document.querySelector('.main-content').scrollTop = 0;
    }

    // 初回読み込み実行
    loadData();
</script>

</body>
</html>

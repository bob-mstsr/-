<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボブの楽屋 🍭</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap');

        :root {
            --bg-color: #fffef5; 
            --text-color: #555;
            --accent-pink: #ff85a1;
            --accent-yellow: #ffe066;
            --accent-blue: #74c0fc;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: var(--bg-color);
            /* カラフルなパステルドット背景 */
            background-image: 
                radial-gradient(circle, #ffdee9 2px, transparent 2px),
                radial-gradient(circle, #e0f2fe 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
            overflow-x: hidden;
        }

        /* ぷかぷかアニメーション */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .hobby-item {
            position: absolute;
            font-size: 2.8rem;
            opacity: 0.3;
            user-select: none;
            pointer-events: none;
            animation: float 4s ease-in-out infinite;
            z-index: 1;
        }

        /* アイテム配置 */
        .item-1  { top: 8%; left: 6%;  animation-delay: 0s; }
        .item-2  { top: 12%; right: 10%; animation-delay: 1s; }
        .item-3  { top: 38%; left: 4%;  animation-delay: 2s; }
        .item-4  { top: 32%; right: 5%; animation-delay: 0.5s; }
        .item-5  { top: 62%; left: 9%;  animation-delay: 1.5s; }
        .item-6  { top: 58%; right: 11%; animation-delay: 2.5s; }
        .item-7  { bottom: 12%; left: 14%; animation-delay: 0.2s; }
        .item-8  { bottom: 18%; right: 10%; animation-delay: 1.2s; }
        .item-9  { bottom: 6%;  left: 42%; animation-delay: 0.8s; }
        .item-10 { bottom: 35%; right: 4%;  animation-delay: 1.8s; }

        .header-section {
            text-align: center;
            margin-bottom: 80px;
            z-index: 10;
        }

        /* ふわふわ吹き出し */
        .bubble {
            background: var(--accent-pink);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 6px 0 #e6738e;
            font-weight: 900;
        }
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            margin-left: -12px;
            border-top: 12px solid var(--accent-pink);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
        }

        .header-section h1 {
            font-size: 3.5rem;
            margin: 0;
            color: #444;
            letter-spacing: -2px;
            /* 下に太めのパステルライン */
            background: linear-gradient(transparent 75%, var(--accent-yellow) 75%);
            display: inline-block;
            padding: 0 10px;
        }

        .main-content {
            display: flex;
            justify-content: center;
            z-index: 10;
            width: 100%;
        }

        /* メイキングカード */
        .room-card {
            background: var(--card-bg);
            border-radius: 45px;
            padding: 60px 40px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 8px solid var(--accent-blue); /* ブルーの太枠 */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 15px 0 var(--accent-blue);
            max-width: 380px;
        }

        .room-card:hover {
            transform: scale(1.05) rotate(-1deg);
            box-shadow: 0 8px 0 var(--accent-blue);
        }

        .icon-box { 
            font-size: 4.5rem; 
            margin-bottom: 30px;
            filter: drop-shadow(0 5px 0 #f0f0f0);
        }
        
        .card-title { 
            font-weight: 900; 
            font-size: 2rem; 
            margin-bottom: 20px; 
            color: #333;
        }
        
        .card-desc { 
            font-size: 1.1rem; 
            color: #666; 
            line-height: 1.8;
            background: #f0f9ff;
            padding: 15px 25px;
            border-radius: 25px;
            font-weight: 700;
        }

        .back-home {
            margin-top: 80px;
            text-decoration: none;
            color: #aaa;
            font-weight: 900;
            font-size: 1.1rem;
            padding: 10px 20px;
            border: 3px dashed #ddd;
            border-radius: 20px;
            transition: 0.3s;
            z-index: 10;
        }
        .back-home:hover {
            color: var(--accent-pink);
            border-color: var(--accent-pink);
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="hobby-item item-1">🤖</div>
    <div class="hobby-item item-2">🎮</div>
    <div class="hobby-item item-3">🎸</div>
    <div class="hobby-item item-4">🎹</div>
    <div class="hobby-item item-5">🪕</div>
    <div class="hobby-item item-6">💿</div>
    <div class="hobby-item item-7">⚡</div>
    <div class="hobby-item item-8">🔊</div>
    <div class="hobby-item item-9">🎧</div>
    <div class="hobby-item item-10">🎼</div>

    <div class="header-section">
        <div class="bubble">ここは、物置みたいなボブの隠し部屋！</div>
        <br>
        <h1>ボブの楽屋</h1>
    </div>

    <div class="main-content">
        <a href="making.html" class="room-card">
            <div class="icon-box">✨</div>
            <div class="card-title">メイキング</div>
            <div class="card-desc">
                「秘密基地」ができるまで。<br>
                AIとの愛の共同作業の軌跡！<br>
ジェミさんは難しい事色々言ってますが<br>
ボブの指示だけ見てみるとわかりやすいと思います^^/<br>

            </div>
        </a>
       <a href="music.html" class="room-card">
            <div class="icon-box">🎵</div>
            <div class="card-title">ミュージック</div>
            <div class="card-desc">
AIを使っておふざけで作った楽曲たちの紹介です♪<br>
            </div>
        </a>
    </div>

    <a href="index.html#main" class="back-home">基地にもどる</a>
<script data-goatcounter="https://bobs-base.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>

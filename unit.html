<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Database - ボブの秘密基地</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1c1e;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --card-bg: #25282c;
            --border-color: #444;
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; }

        /* ヘッダー */
        header {
            background: rgba(0,0,0,0.95); height: 60px; display: flex; 
            justify-content: space-between; align-items: center; 
            z-index: 1000; border-bottom: 2px solid var(--accent-color); 
            padding: 0 15px; flex-shrink: 0;
        }
        .logo-link { text-decoration: none; font-weight: bold; font-size: 1.1rem; color: var(--accent-color); }
        .nav-links { display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
        .nav-item-custom { color: #e0e0e0; text-decoration: none; font-size: 0.85rem; padding: 6px 10px; border-radius: 4px; border: 1px solid transparent; }
        .nav-item-custom:hover { background: rgba(0, 212, 255, 0.2); border-color: var(--accent-color); }

        /* 検索エリア */
        .toolbar {
            display: flex; flex-wrap: wrap; align-items: center; gap: 20px;
            padding: 10px 15px; background: #222; border-bottom: 1px solid var(--accent-color);
            font-size: 13px; flex-shrink: 0;
        }
        .toolbar input { background: #333; color: white; border: 1px solid var(--accent-color); padding: 4px 8px; border-radius: 4px; }
        .range-input { width: 70px; }

        /* 上部スクロールバー用コンテナ */
        .top-scrollbar-wrapper {
            width: 100%; overflow-x: auto; background: #222; flex-shrink: 0;
            border-bottom: 1px solid var(--border-color);
        }
        .top-scrollbar-content { height: 1px; } /* 中身は1pxの高さで、幅だけテーブルに合わせる */

        /* テーブルエリア（ここ自体をスクロールさせる） */
        .table-wrapper { 
            flex-grow: 1; 
            overflow: auto; /* 縦横両方のスクロールをここで管理 */
            background: var(--card-bg);
            position: relative;
        }
        
        #unitTable { width: 100% !important; font-size: 12px; border-collapse: separate; border-spacing: 0; }
        #unitTable th, #unitTable td { 
            white-space: nowrap; padding: 8px 12px; 
            border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color);
            background-color: var(--card-bg);
        }

        /* 縦固定（ヘッダー項目名） */
        #unitTable thead th { 
            position: sticky; top: 0; z-index: 100; 
            background-color: #333 !important; color: var(--accent-color); 
        }

        /* 横固定（1列目: No, 2列目: 機体名） */
        #unitTable th:nth-child(1), #unitTable td:nth-child(1) { position: sticky; left: 0; z-index: 10; border-right: 2px solid var(--accent-color); }
        #unitTable th:nth-child(2), #unitTable td:nth-child(2) { position: sticky; left: 55px; z-index: 10; border-right: 2px solid var(--accent-color); }
        
        /* 角の固定用 */
        #unitTable thead th:nth-child(1) { z-index: 110; left: 0; }
        #unitTable thead th:nth-child(2) { z-index: 110; left: 55px; }

        /* スクロールバーのカスタマイズ（常に見えやすく） */
        .table-wrapper::-webkit-scrollbar, .top-scrollbar-wrapper::-webkit-scrollbar { height: 12px; width: 12px; }
        .table-wrapper::-webkit-scrollbar-thumb, .top-scrollbar-wrapper::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
        .table-wrapper::-webkit-scrollbar-track, .top-scrollbar-wrapper::-webkit-scrollbar-track { background: #222; }

    </style>
</head>
<body>

<header>
    <a href="index.html#main" class="logo-link">ボブの秘密基地</a>
    <nav class="nav-links">
        <a href="unit.html" class="nav-item-custom">Unit</a>
        <a href="derivatives.html" class="nav-item-custom">Derivatives</a>
        <a href="arms.html" class="nav-item-custom">Arms</a>
        <a href="battle.html" class="nav-item-custom">Battle</a>
        <a href="novels.html" class="nav-item-custom">Novels</a>
        <a href="tactics.html" class="nav-item-custom">Tactics</a>
        <a href="hunter.html" class="nav-item-custom">Hunter</a>
        <a href="trivia.html" class="nav-item-custom">Trivia</a>
        <a href="emoji.html" class="nav-item-custom">Emoji</a>
        <a href="link.html" class="nav-item-custom">Link</a>
    </nav>
</header>

<div class="toolbar">
    <div id="lenMenu"></div>
    <div id="customFilter"></div>
    <div>
        <strong>No範囲:</strong>
        <input type="number" id="min" class="range-input" placeholder="Min"> ～ 
        <input type="number" id="max" class="range-input" placeholder="Max">
    </div>
</div>

<div class="top-scrollbar-wrapper" id="topScroll">
    <div class="top-scrollbar-content" id="topScrollContent"></div>
</div>

<div class="table-wrapper" id="mainScroll">
    <table id="unitTable" class="display nowrap"></table>
</div>

<script>
$(document).ready(function () {
    let table = null;

    // No範囲検索
    $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
        let min = parseInt($('#min').val(), 10);
        let max = parseInt($('#max').val(), 10);
        let noValue = parseFloat(data[0]) || 0; 
        return (isNaN(min) && isNaN(max)) || (isNaN(min) && noValue <= max) || (min <= noValue && isNaN(max)) || (min <= noValue && noValue <= max);
    });

    function initUnitTable() {
        const csvFile = "unit_26.3.24.csv";
        Papa.parse(csvFile, {
            download: true, header: true, skipEmptyLines: true, encoding: "UTF-8",
            complete: function (results) {
                const headers = results.meta.fields;
                let tableHtml = '<thead><tr>';
                headers.forEach(h => tableHtml += `<th>${h.trim()}</th>`);
                tableHtml += '</tr></thead><tbody id="tableBody"></tbody>';
                $('#unitTable').html(tableHtml);

                results.data.forEach(row => {
                    let tr = '<tr>';
                    headers.forEach(h => tr += `<td>${row[h] ?? row[h.trim()] ?? ''}</td>`);
                    tr += '</tr>';
                    $('#tableBody').append(tr);
                });

                table = $('#unitTable').DataTable({
                    dom: 'lfrtip',
                    lengthMenu: [[20, 50, 100, -1], [20, 50, 100, "全表示"]],
                    pageLength: 50, scrollX: false, autoWidth: false,
                    language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ja.json" },
                    initComplete: function() {
                        $('.dataTables_length').detach().appendTo('#lenMenu');
                        $('.dataTables_filter').detach().appendTo('#customFilter');
                        syncScrollbars(); // スクロールバーの同期設定
                    }
                });
            }
        });
    }

    // 上下のスクロールバーを同期させる
    function syncScrollbars() {
        const topScroll = $('#topScroll');
        const mainScroll = $('#mainScroll');
        const table = $('#unitTable');

        // 上部スクロールバーの中身の幅をテーブルの幅に合わせる
        $('#topScrollContent').width(table.width());

        topScroll.on('scroll', function() {
            mainScroll.scrollLeft(topScroll.scrollLeft());
        });
        mainScroll.on('scroll', function() {
            topScroll.scrollLeft(mainScroll.scrollLeft());
        });
    }

    $('#min, #max').on('keyup change', function() { if (table) table.draw(); });
    initUnitTable();
});
</script>
<script data-goatcounter="https://あなたのコード.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>

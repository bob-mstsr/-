<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Database - ボブの秘密基地</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1c1e;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --card-bg: #25282c;
            --border-color: #444;
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg-color); color: var(--text-color); overflow-x: hidden; }

        /* --- ヘッダー（最新共通版） --- */
        header {
            background: rgba(0,0,0,0.95); height: 60px; display: flex; 
            justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--accent-color); 
            padding: 0 15px; box-sizing: border-box;
        }
        .logo-link { text-decoration: none; font-weight: bold; font-size: 1.1rem; color: var(--accent-color); white-space: nowrap; }
        .nav-links { display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-item-custom { color: #e0e0e0; text-decoration: none; font-size: 0.85rem; padding: 6px 10px; border-radius: 4px; border: 1px solid transparent; transition: 0.2s; }
        .nav-item-custom:hover { background: rgba(0, 212, 255, 0.2); border-color: var(--accent-color); }

        /* --- 検索ツールバー --- */
        .toolbar {
            display: flex; flex-wrap: wrap; align-items: center; gap: 20px;
            padding: 15px; background: #222; border-bottom: 1px solid var(--accent-color);
            font-size: 13px; color: white;
        }
        .toolbar div { display: flex; align-items: center; }
        .toolbar input, .toolbar select { 
            background: #333; color: white; border: 1px solid var(--accent-color); 
            padding: 4px 8px; border-radius: 4px; margin: 0 5px;
        }
        .range-input { width: 70px; }

        /* --- テーブルエリア --- */
        .table-container { width: 100%; height: calc(100vh - 150px); overflow: auto; background: var(--card-bg); }
        
        #unitTable { width: 100% !important; font-size: 12px; border-collapse: separate; border-spacing: 0; }
        #unitTable th, #unitTable td { 
            white-space: nowrap; padding: 8px 12px; 
            border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color);
            background-color: var(--card-bg); color: var(--text-color);
        }

        /* 縦固定（ヘッダー） */
        #unitTable thead th { position: sticky; top: 0; z-index: 100; background-color: #333 !important; color: var(--accent-color); }

        /* 横固定（1列目: No, 2列目: 機体名） */
        #unitTable th:nth-child(1), #unitTable td:nth-child(1) { position: sticky; left: 0; z-index: 10; border-right: 2px solid var(--accent-color); }
        #unitTable th:nth-child(2), #unitTable td:nth-child(2) { position: sticky; left: 55px; z-index: 10; border-right: 2px solid var(--accent-color); }
        
        /* 角の固定 */
        #unitTable thead th:nth-child(1) { z-index: 110; }
        #unitTable thead th:nth-child(2) { z-index: 110; }

        /* DataTables標準パーツの調整 */
        .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_paginate { color: var(--text-color) !important; padding: 10px; }
        .dataTables_paginate .paginate_button { color: var(--text-color) !important; background: #333 !important; border: 1px solid var(--border-color) !important; }
    </style>
</head>
<body>

<header>
    <a href="index.html#main" class="logo-link">ボブの秘密基地</a>
    <nav class="nav-links">
        <a href="unit.html" class="nav-item-custom">Unit</a>
        <a href="arms.html" class="nav-item-custom">Arms</a>
        <a href="battle.html" class="nav-item-custom">Battle</a>
        <a href="tactics.html" class="nav-item-custom">Tactics</a>
        <a href="hunter.html" class="nav-item-custom">Hunter</a>
        <a href="trivia.html" class="nav-item-custom">Trivia</a>
        <a href="emoji.html" class="nav-item-custom">Emoji</a>
        <a href="link.html" class="nav-item-custom">Link</a>
    </nav>
</header>

<div class="toolbar">
    <div id="lenMenu"><strong>表示:</strong> </div>
    <div id="customFilter"><strong>検索:</strong> </div>
    <div>
        <strong>No範囲:</strong>
        <input type="number" id="min" class="range-input" placeholder="Min"> ～ 
        <input type="number" id="max" class="range-input" placeholder="Max">
    </div>
</div>

<div class="table-container">
    <table id="unitTable" class="display nowrap"></table>
</div>

<script>
$(document).ready(function () {
    let table = null;

    // No範囲検索ロジックの登録
    $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
        let min = parseInt($('#min').val(), 10);
        let max = parseInt($('#max').val(), 10);
        let noValue = parseFloat(data[0]) || 0; 
        if ((isNaN(min) && isNaN(max)) || (isNaN(min) && noValue <= max) || (min <= noValue && isNaN(max)) || (min <= noValue && noValue <= max)) {
            return true;
        }
        return false;
    });

    // CSVの読み込みとテーブル生成
    function initUnitTable() {
        const csvFile = "unit_26.3.24.csv"; // GitHub上のファイル名

        Papa.parse(csvFile, {
            download: true,
            header: true,
            skipEmptyLines: true,
            encoding: "UTF-8", // 文字化けする場合は "Shift_JIS" に変更
            complete: function (results) {
                if (!results.data || results.data.length === 0) return;

                const headers = results.meta.fields;
                let tableHtml = '<thead><tr>';
                headers.forEach(h => tableHtml += `<th>${h.trim()}</th>`);
                tableHtml += '</tr></thead><tbody id="tableBody"></tbody>';
                $('#unitTable').html(tableHtml);

                results.data.forEach(row => {
                    let tr = '<tr>';
                    headers.forEach(h => {
                        let val = row[h] ?? row[h.trim()] ?? '';
                        tr += `<td>${val}</td>`;
                    });
                    tr += '</tr>';
                    $('#tableBody').append(tr);
                });

                // DataTableの初期化
                table = $('#unitTable').DataTable({
                    dom: '<"top"lf>rt<"bottom"ip><"clear">',
                    lengthMenu: [[20, 50, 100, 1000, -1], [20, 50, 100, 1000, "全表示"]],
                    pageLength: 50,
                    scrollX: true,
                    autoWidth: false,
                    language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ja.json" },
                    initComplete: function() {
                        // 標準コントロールをツールバーへ移動
                        $('.dataTables_length').detach().appendTo('#lenMenu');
                        $('.dataTables_filter').detach().appendTo('#customFilter');
                    }
                });
            }
        });
    }

    // 範囲検索のイベント監視
    $('#min, #max').on('keyup change', function() {
        if (table) table.draw();
    });

    initUnitTable();
});
</script>

</body>
</html>
